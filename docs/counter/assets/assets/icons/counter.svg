<?xml version="1.0" encoding="UTF-8"?>
<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景圓形 -->
  <circle cx="64" cy="64" r="60" fill="#2196F3" stroke="#1976D2" stroke-width="4"/>
  
  <!-- 計數器顯示框 -->
  <rect x="24" y="40" width="80" height="24" rx="12" fill="white" opacity="0.9"/>
  
  <!-- 數字 -->
  <text x="64" y="58" font-family="Arial, sans-serif" font-size="16" font-weight="bold" 
        text-anchor="middle" fill="#1976D2">123</text>
  
  <!-- 加號按鈕 -->
  <circle cx="44" cy="88" r="12" fill="white" opacity="0.9"/>
  <text x="44" y="93" font-family="Arial, sans-serif" font-size="16" font-weight="bold" 
        text-anchor="middle" fill="#2196F3">+</text>
  
  <!-- 重置按鈕 -->
  <circle cx="84" cy="88" r="12" fill="white" opacity="0.9"/>
  <text x="84" y="93" font-family="Arial, sans-serif" font-size="12" font-weight="bold" 
        text-anchor="middle" fill="#2196F3">↻</text>
</svg>